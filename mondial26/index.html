<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondial 2026 - Pronostics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="hero">
        <div class="hero-bg"></div>
        <h1 class="hero-title">Mondial 2026</h1>
        <div class="hero-players">
            <div class="hero-player">
                <div class="hero-avatar-wrapper">
                    <img src="hillel.jpeg" alt="Hillel" class="hero-avatar">
                </div>
                <span class="hero-name">Hillel</span>
                <span class="hero-score" id="score-hillel">0</span>
            </div>
            <div class="hero-player">
                <div class="hero-avatar-wrapper">
                    <img src="yannai.jpeg" alt="Yannai" class="hero-avatar">
                </div>
                <span class="hero-name">Yannai</span>
                <span class="hero-score" id="score-yannai">0</span>
            </div>
            <div class="hero-player">
                <div class="hero-avatar-wrapper">
                    <img src="noam.png" alt="Noam" class="hero-avatar">
                </div>
                <span class="hero-name">Noam</span>
                <span class="hero-score" id="score-noam">0</span>
            </div>
        </div>
    </section>

    <nav id="toolbar">
        <div id="rounds"></div>
    </nav>

    <section id="matches"></section>

    <footer>
        <p>World Cup 2026 - Family Predictions 🏆</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
