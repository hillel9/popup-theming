<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondial 2026 - Pronostics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="main-nav">
        <button class="nav-btn active" data-view="home">Home</button>
        <button class="nav-btn" data-view="matches">Matches</button>
    </nav>

    <!-- HOME VIEW -->
    <section id="home-view">
        <section id="prediction-podium">
            <h2 class="section-title">Prediction Champion</h2>
            <div class="pred-podium" id="pred-podium"></div>
        </section>

        <section id="stats-section">
            <h2 class="section-title">Stats</h2>
            <div class="stats-grid" id="stats-grid"></div>
        </section>

        <section id="tournament-podium">
            <h2 class="section-title">Mondial 2026</h2>
            <div class="podium">
                <div class="podium-spot second">
                    <div class="podium-flag">🇦🇷</div>
                    <div class="podium-team">Argentina</div>
                    <div class="podium-block">2</div>
                </div>
                <div class="podium-spot first">
                    <div class="podium-flag">🇪🇸</div>
                    <div class="podium-team">Spain</div>
                    <div class="podium-block">1</div>
                </div>
                <div class="podium-spot third">
                    <div class="podium-flag">🏴󠁧󠁢󠁥󠁮󠁧󠁿</div>
                    <div class="podium-team">England</div>
                    <div class="podium-block">3</div>
                </div>
            </div>
        </section>
    </section>

    <!-- MATCHES VIEW -->
    <section id="matches-view" style="display:none;">
        <section id="hero">
            <div class="hero-bg"></div>
            <h1 class="hero-title">Mondial 2026</h1>
            <div class="hero-players">
                <div class="hero-player">
                    <div class="hero-avatar-wrapper">
                        <img src="hillel.jpeg" alt="Hillel" class="hero-avatar">
                    </div>
                    <span class="hero-name">Hillel</span>
                    <span class="hero-score" id="score-hillel">0</span>
                </div>
                <div class="hero-player">
                    <div class="hero-avatar-wrapper">
                        <img src="yannai.jpeg" alt="Yannai" class="hero-avatar">
                    </div>
                    <span class="hero-name">Yannai</span>
                    <span class="hero-score" id="score-yannai">0</span>
                </div>
                <div class="hero-player">
                    <div class="hero-avatar-wrapper">
                        <img src="noam.png" alt="Noam" class="hero-avatar">
                    </div>
                    <span class="hero-name">Noam</span>
                    <span class="hero-score" id="score-noam">0</span>
                </div>
            </div>
        </section>

        <nav id="toolbar">
            <div id="rounds"></div>
        </nav>

        <section id="matches"></section>
    </section>

    <footer>
        <p>World Cup 2026 - Family Predictions</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
